<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetBuddy — Today's NCAAB Slate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #09090b;
            --bg-card: #111113;
            --bg-chip: #18181b;
            --bg-header: #09090b;
            --border: #1c1c22;
            --border-hover: #27272a;
            --text: #e2e8f0;
            --text-heading: #f4f4f5;
            --text-team: #e4e4e7;
            --text-muted: #71717a;
            --text-dim: #52525b;
            --text-faint: #3f3f46;
            --text-footer: #27272a;
            --text-analysis: #a1a1aa;
            --text-analysis-strong: #e4e4e7;
            --accent: #3b82f6;
            --dot-pending: #27272a;
            --chip-border: #27272a;
            --pending-opacity: 0.55;
        }

        body.light {
            --bg: #fafafa;
            --bg-card: #ffffff;
            --bg-chip: #f4f4f5;
            --bg-header: #fafafa;
            --border: #e4e4e7;
            --border-hover: #d4d4d8;
            --text: #27272a;
            --text-heading: #09090b;
            --text-team: #18181b;
            --text-muted: #71717a;
            --text-dim: #a1a1aa;
            --text-faint: #d4d4d8;
            --text-footer: #d4d4d8;
            --text-analysis: #52525b;
            --text-analysis-strong: #18181b;
            --accent: #2563eb;
            --dot-pending: #d4d4d8;
            --chip-border: #e4e4e7;
            --pending-opacity: 0.45;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }

        .header {
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
            padding: 28px 24px 20px;
        }

        .header-inner {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-heading);
            letter-spacing: -0.5px;
        }

        .header h1 span {
            color: var(--accent);
        }

        .header .date {
            font-size: 13px;
            color: var(--text-dim);
        }

        .subheader {
            max-width: 720px;
            margin: 0 auto;
            padding: 16px 24px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-count {
            font-size: 13px;
            color: var(--text-muted);
        }

        .legend {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 8px 16px 48px;
        }

        .game-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: border-color 0.15s, background 0.2s;
        }

        .game-card.analyzed {
            cursor: pointer;
        }

        .game-card.analyzed:hover {
            border-color: var(--border-hover);
        }

        .game-card.pending {
            opacity: var(--pending-opacity);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            gap: 12px;
        }

        .matchup {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            min-width: 0;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.analyzed {
            background: var(--accent);
        }

        .status-dot.pending {
            background: var(--dot-pending);
        }

        .team {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-team);
        }

        .at {
            color: var(--text-faint);
            font-size: 12px;
        }

        .game-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .odds-line {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-dim);
        }

        .tip-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-faint);
        }

        .score-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 7px;
            border-radius: 5px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            letter-spacing: 0.3px;
        }

        .score-badge.final {
            color: var(--text-muted);
            background: var(--bg-chip);
            border: 1px solid var(--border);
        }

        .score-badge.live {
            color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.25);
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-live 1.5s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-live {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.75); }
        }

        .expand-icon {
            color: var(--text-faint);
            font-size: 13px;
            transition: transform 0.15s;
        }

        .expand-icon.open {
            transform: rotate(90deg);
        }

        .picks-row {
            display: flex;
            gap: 6px;
            padding: 0 16px 12px;
            flex-wrap: wrap;
        }

        .pick-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-chip);
            border: 1px solid var(--chip-border);
            border-radius: 6px;
            padding: 6px 12px;
        }

        .pick-chip.pass {
            opacity: 0.5;
        }

        .pick-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-heading);
        }

        .pick-conf {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .analysis-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .analysis-panel.open {
            max-height: 3000px;
            transition: max-height 0.5s ease-in;
        }

        .analysis-content {
            padding: 0 16px 16px;
            font-size: 13px;
            color: var(--text-analysis);
            border-top: 1px solid var(--border);
            padding-top: 14px;
            line-height: 1.65;
        }

        .analysis-content strong {
            color: var(--text-analysis-strong);
        }

        .footer {
            text-align: center;
            padding: 24px;
            font-size: 11px;
            color: var(--text-footer);
            font-family: 'JetBrains Mono', monospace;
        }

        .theme-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s;
            z-index: 100;
        }

        .theme-toggle:hover {
            border-color: var(--border-hover);
        }

        @media (max-width: 480px) {
            .header-inner { flex-direction: column; gap: 4px; }
            .game-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .game-meta { width: 100%; justify-content: space-between; }
            .team { font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <h1>Bet<span>Buddy</span></h1>
            <span class="date">Monday, March 16, 2026</span>
        </div>
    </div>

    <div class="subheader">
        <span class="game-count">0 games · 0 analyzed</span>
        <div class="legend">
            <div class="legend-item">
                <span class="status-dot analyzed"></span>
                Analyzed
            </div>
            <div class="legend-item">
                <span class="status-dot pending"></span>
                Pending
            </div>
        </div>
    </div>

    <div class="container">
        <div style="text-align:center;padding:48px;color:var(--text-dim)">No games scheduled today.</div>
    </div>

    <div class="footer">
        Updated 11:17 AM ET · betbuddy
    </div>

    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>

    <script>
        function toggleAnalysis(id) {
            const panel = document.getElementById(id);
            const icon = document.getElementById('icon-' + id);
            if (panel) {
                panel.classList.toggle('open');
            }
            if (icon) {
                icon.classList.toggle('open');
            }
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-toggle');
            body.classList.toggle('light');
            const isLight = body.classList.contains('light');
            btn.textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('betbuddy-theme', isLight ? 'light' : 'dark');
        }

        // Load saved preference
        (function() {
            const saved = localStorage.getItem('betbuddy-theme');
            if (saved === 'light') {
                document.body.classList.add('light');
                document.getElementById('theme-toggle').textContent = '☀️';
            }
        })();

        // Live score polling — fetches scores.json every 60s and updates cards
        async function pollScores() {
            try {
                const resp = await fetch('scores.json?t=' + Date.now());
                if (!resp.ok) return;
                const data = await resp.json();
                for (const [gameId, score] of Object.entries(data.scores || {})) {
                    const card = document.querySelector(`[data-game-id="${gameId}"]`);
                    if (!card) continue;
                    const meta = card.querySelector('.game-meta');
                    if (!meta) continue;

                    const scoreStr = score.away + '–' + score.home;
                    let badge = card.querySelector('.score-badge');

                    if (badge) {
                        // Update existing badge
                        if (score.completed) {
                            badge.className = 'score-badge final';
                            badge.innerHTML = 'FINAL&nbsp;' + scoreStr;
                        } else {
                            badge.className = 'score-badge live';
                            badge.innerHTML = '<span class="live-dot"></span>LIVE&nbsp;' + scoreStr;
                        }
                    } else {
                        // Insert badge, replacing tip time
                        const tipEl = meta.querySelector('.tip-time');
                        if (!tipEl) continue;
                        badge = document.createElement('span');
                        if (score.completed) {
                            badge.className = 'score-badge final';
                            badge.innerHTML = 'FINAL&nbsp;' + scoreStr;
                        } else {
                            badge.className = 'score-badge live';
                            badge.innerHTML = '<span class="live-dot"></span>LIVE&nbsp;' + scoreStr;
                        }
                        tipEl.replaceWith(badge);
                    }
                }
            } catch (e) {
                // Silently fail — scores are nice-to-have
            }
        }

        pollScores();
        setInterval(pollScores, 60000);
    </script>
</body>
</html>
